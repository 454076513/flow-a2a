services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
      POSTGRES_DB: flow_a2a
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow -d flow_a2a"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  center:
    image: flow-a2a-center:local
    ports:
      - "9876:9876"
      - "3100:3000"
    environment:
      WS_PORT: "9876"
      HTTP_PORT: "3000"
      DB_TYPE: "postgres"
      DATABASE_URL: "postgres://flow:flow@postgres:5432/flow_a2a"
      REDIS_URL: "redis://redis:6379"
      RELAY_TOKEN: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  openclaw-1:
    image: openclaw:local
    ports:
      - "28789:18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ./test/openclaw-config:/home/node/.openclaw
    command: >
      sh -c "node openclaw.mjs plugins install @flow-a2a/plugin || true;
             node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789"
    depends_on:
      center:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  openclaw-2:
    image: openclaw:local
    ports:
      - "38789:18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ./test/openclaw-config-2:/home/node/.openclaw
    command: >
      sh -c "node openclaw.mjs plugins install @flow-a2a/plugin || true;
             node openclaw.mjs gateway --allow-unconfigured --bind lan --port 18789"
    depends_on:
      center:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

